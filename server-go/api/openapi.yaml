components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: higo_session
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    SpaceParam:
      name: space
      in: query
      schema:
        type: string
      description: Space name or ID, matching frontend labels such as 家庭空间 or 团队空间.
    ParentIdParam:
      name: parentId
      in: query
      schema:
        type: string
    DepthParam:
      name: depth
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 8
        default: 2
    SearchQueryParam:
      name: q
      in: query
      schema:
        type: string
    FileTypeParam:
      name: type
      in: query
      schema:
        type: string
    TagsParam:
      name: tags
      in: query
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSizeParam:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    RangeParam:
      name: range
      in: query
      schema:
        type: string
        enum: [15m, 1h, 6h, 24h, 7d, 30d]
        default: 24h
    EventCursorParam:
      name: cursor
      in: query
      schema:
        type: string
    EventTypesParam:
      name: types
      in: query
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/EventType'
  responses:
    SuccessResponse:
      description: Generic success response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessEnvelope'
    ErrorResponse:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    SystemInfoResponse:
      description: System info response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ResponseEnvelope'
              - type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SystemInfo'
    DesktopAppsResponse:
      description: Dock apps response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ResponseEnvelope'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DesktopApp'
    DesktopWindowsResponse:
      description: Desktop windows response.
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ResponseEnvelope'
              - type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DesktopWindow'
    DesktopSessionResponse:
      description: Desktop session response.
      content:
        application/json:
          schema:
            allOf:
