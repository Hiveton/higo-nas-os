openapi: 3.1.0
info:
  title: HiGoOS Backend API
  version: 0.1.0
  summary: Contract for the HiGoOS web-pc desktop and first full backend release.
  description: >
    This OpenAPI contract is the source of truth between the Go backend and the
    web-pc frontend. Responses use a common envelope with stable domain schemas.
servers:
  - url: /api/v1
    description: Same-origin API base path.
security:
  - sessionCookie: []
tags:
  - name: System
  - name: Desktop
  - name: Events
  - name: Files
  - name: Storage
  - name: Security
  - name: Monitoring
  - name: Settings
  - name: Remote
  - name: Docker
  - name: Downloads
  - name: Media
  - name: Assistant
  - name: Agents
  - name: Workflows
paths:
  /system/info:
    get:
      tags: [System]
      operationId: getSystemInfo
      summary: Get backend runtime and adapter information.
      security: []
      responses:
        '200':
          $ref: '#/components/responses/SystemInfoResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /desktop/apps:
    get:
      tags: [Desktop]
      operationId: listDesktopApps
      summary: List dock applications.
      responses:
        '200':
          $ref: '#/components/responses/DesktopAppsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /desktop/windows:
    get:
      tags: [Desktop]
      operationId: listDesktopWindows
      summary: List persisted desktop window configurations.
      responses:
        '200':
          $ref: '#/components/responses/DesktopWindowsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /desktop/session:
    get:
      tags: [Desktop]
      operationId: getDesktopSession
      summary: Get current user desktop session.
      responses:
        '200':
          $ref: '#/components/responses/DesktopSessionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Desktop]
      operationId: updateDesktopSession
      summary: Update current user desktop session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDesktopSessionRequest'
      responses:
        '200':
          $ref: '#/components/responses/DesktopSessionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /desktop/status:
    get:
      tags: [Desktop]
      operationId: getDesktopStatus
      summary: Get global desktop status, badges, notifications, and model policy.
      responses:
        '200':
          $ref: '#/components/responses/DesktopStatusResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /events/stream:
    get:
      tags: [Events]
      operationId: streamEvents
      summary: Stream task, alert, monitoring, Docker, download, assistant, and workflow events.
      parameters:
        - $ref: '#/components/parameters/EventCursorParam'
        - $ref: '#/components/parameters/EventTypesParam'
      responses:
        '200':
          description: Server-sent event stream. Each event data payload is an Event object.
          content:
            text/event-stream:
              schema:
                type: string
        default:
          $ref: '#/components/responses/ErrorResponse'
  /files/tree:
    get:
      tags: [Files]
      operationId: getFileTree
      summary: Get a file tree for a space or folder.
      parameters:
        - $ref: '#/components/parameters/SpaceParam'
        - $ref: '#/components/parameters/ParentIdParam'
        - $ref: '#/components/parameters/DepthParam'
      responses:
        '200':
          $ref: '#/components/responses/FileTreeResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /files/search:
    get:
      tags: [Files]
      operationId: searchFiles
      summary: Search files by keyword, space, type, and tags.
      parameters:
        - $ref: '#/components/parameters/SearchQueryParam'
        - $ref: '#/components/parameters/SpaceParam'
        - $ref: '#/components/parameters/FileTypeParam'
        - $ref: '#/components/parameters/TagsParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          $ref: '#/components/responses/FileListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /files/{id}:
    get:
      tags: [Files]
      operationId: getFile
      summary: Get file or folder metadata.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          $ref: '#/components/responses/FileDetailResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /files/{id}/preview:
    get:
      tags: [Files]
      operationId: getFilePreview
      summary: Get safe preview metadata or preview content for a file.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          $ref: '#/components/responses/FilePreviewResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /files/{id}/tags:
    post:
      tags: [Files]
      operationId: updateFileTags
      summary: Replace or merge tags for a file.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTagsRequest'
      responses:
        '200':
          $ref: '#/components/responses/FileDetailResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /files/{id}/shares:
    post:
      tags: [Files]
      operationId: createFileShare
      summary: Create a share link for a file or folder.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShareRequest'
      responses:
        '200':
          $ref: '#/components/responses/ShareLinkResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /files/{id}/restore:
    post:
      tags: [Files]
      operationId: restoreFile
      summary: Restore a recycled file or folder.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreFileRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /files/batch/move:
    post:
      tags: [Files]
      operationId: moveFiles
      summary: Move files or folders as a rollbackable task.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchMoveRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /files/batch/rename:
    post:
      tags: [Files]
      operationId: renameFiles
      summary: Rename files or folders as a rollbackable task.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRenameRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /files/batch/delete:
    post:
      tags: [Files]
      operationId: deleteFiles
      summary: Recycle or permanently delete files as a rollbackable task.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchDeleteRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /storage/pools:
    get:
      tags: [Storage]
      operationId: listStoragePools
      summary: List storage pools and volumes.
      responses:
        '200':
          $ref: '#/components/responses/StoragePoolsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /storage/disks:
    get:
      tags: [Storage]
      operationId: listDisks
      summary: List disks, slots, health, capacity, and temperatures.
      responses:
        '200':
          $ref: '#/components/responses/DisksResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /storage/smart:
    get:
      tags: [Storage]
      operationId: listSmartReports
      summary: List current SMART summaries.
      parameters:
        - name: diskId
          in: query
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/SmartReportsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /storage/tasks/smart-scan:
    post:
      tags: [Storage]
      operationId: startSmartScan
      summary: Start a SMART scan task.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorageTaskRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /storage/tasks/repair:
    post:
      tags: [Storage]
      operationId: startStorageRepair
      summary: Start a pool repair task.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorageTaskRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /storage/tasks/snapshot:
    post:
      tags: [Storage]
      operationId: createStorageSnapshot
      summary: Create a snapshot task.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorageTaskRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /storage/tasks/{id}:
    get:
      tags: [Storage]
      operationId: getStorageTask
      summary: Get storage task status.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /steward/suggestions:
    get:
      tags: [Security]
      operationId: listStewardSuggestions
      summary: List AI file steward suggestions.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          $ref: '#/components/responses/StewardSuggestionsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /steward/suggestions/{id}/preview:
    post:
      tags: [Security]
      operationId: previewStewardSuggestion
      summary: Preview a file steward operation plan.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewRequest'
      responses:
        '200':
          $ref: '#/components/responses/ActionPreviewResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /steward/suggestions/{id}/confirm:
    post:
      tags: [Security]
      operationId: confirmStewardSuggestion
      summary: Confirm a steward suggestion after preview.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmActionRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /steward/suggestions/{id}/dismiss:
    post:
      tags: [Security]
      operationId: dismissStewardSuggestion
      summary: Dismiss a steward suggestion.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /steward/audit:
    get:
      tags: [Security]
      operationId: listStewardAudit
      summary: List steward audit records.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          $ref: '#/components/responses/AuditListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /steward/audit/{id}/rollback:
    post:
      tags: [Security]
      operationId: rollbackStewardAudit
      summary: Roll back a steward audit record.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /security/identities:
    get:
      tags: [Security]
      operationId: listIdentities
      summary: List users, groups, roles, spaces, and trusted devices.
      parameters:
        - name: kind
          in: query
          schema:
            $ref: '#/components/schemas/IdentityKind'
      responses:
        '200':
          $ref: '#/components/responses/IdentitiesResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /security/identities/{id}/permissions:
    put:
      tags: [Security]
      operationId: updateIdentityPermissions
      summary: Update app, file, AI, or Agent permissions for an identity.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionsRequest'
      responses:
        '200':
          $ref: '#/components/responses/IdentityResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /security/ai-policies:
    get:
      tags: [Security]
      operationId: listAiPolicies
      summary: List AI visibility and model routing policies.
      responses:
        '200':
          $ref: '#/components/responses/AiPoliciesResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /security/ai-policies/{id}:
    put:
      tags: [Security]
      operationId: updateAiPolicy
      summary: Update an AI policy.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AiPolicy'
      responses:
        '200':
          $ref: '#/components/responses/AiPolicyResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /security/risk-actions:
    get:
      tags: [Security]
      operationId: listRiskActions
      summary: List pending or historical risk actions.
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/RiskActionStatus'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          $ref: '#/components/responses/RiskActionsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /security/risk-actions/{id}/confirm:
    post:
      tags: [Security]
      operationId: confirmRiskAction
      summary: Confirm a medium or high risk action.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmActionRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /security/risk-actions/{id}/block:
    post:
      tags: [Security]
      operationId: blockRiskAction
      summary: Block a risk action.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockActionRequest'
      responses:
        '200':
          $ref: '#/components/responses/RiskActionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /security/audit:
    get:
      tags: [Security]
      operationId: listSecurityAudit
      summary: List append-only security audit records.
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/RangeParam'
      responses:
        '200':
          $ref: '#/components/responses/AuditListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /security/audit/{id}/rollback:
    post:
      tags: [Security]
      operationId: rollbackSecurityAudit
      summary: Roll back an audit record when rollback metadata exists.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RollbackRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /shares:
    get:
      tags: [Security]
      operationId: listShares
      summary: List active and historical share links.
      parameters:
        - name: activeOnly
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          $ref: '#/components/responses/SharesResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /shares/{id}:
    delete:
      tags: [Security]
      operationId: revokeShare
      summary: Revoke a share link.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          $ref: '#/components/responses/SuccessResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /monitoring/metrics/current:
    get:
      tags: [Monitoring]
      operationId: getCurrentMetrics
      summary: Get current CPU, memory, network, storage, temperature, and service metrics.
      responses:
        '200':
          $ref: '#/components/responses/MetricsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /monitoring/metrics/trend:
    get:
      tags: [Monitoring]
      operationId: getMetricTrend
      summary: Get metric trend series.
      parameters:
        - $ref: '#/components/parameters/RangeParam'
        - name: metric
          in: query
          schema:
            type: string
      responses:
        '200':
          $ref: '#/components/responses/MetricTrendResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /monitoring/logs:
    get:
      tags: [Monitoring]
      operationId: listLogs
      summary: List application, system, Docker, and task logs.
      parameters:
        - name: source
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            $ref: '#/components/schemas/LogLevel'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          $ref: '#/components/responses/LogsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /monitoring/alerts:
    get:
      tags: [Monitoring]
      operationId: listAlerts
      summary: List alert records.
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AlertStatus'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          $ref: '#/components/responses/AlertsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Monitoring]
      operationId: createAlert
      summary: Create a manual alert or notification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAlertRequest'
      responses:
        '200':
          $ref: '#/components/responses/AlertResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /monitoring/alerts/{id}/mute:
    post:
      tags: [Monitoring]
      operationId: muteAlert
      summary: Mute an alert for a period.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MuteAlertRequest'
      responses:
        '200':
          $ref: '#/components/responses/AlertResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /monitoring/diagnostics:
    post:
      tags: [Monitoring]
      operationId: runDiagnostics
      summary: Start a diagnostics run.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnosticsRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /settings:
    get:
      tags: [Settings]
      operationId: getSettings
      summary: Get system settings.
      responses:
        '200':
          $ref: '#/components/responses/SettingsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Settings]
      operationId: updateSettings
      summary: Update system settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSettingsRequest'
      responses:
        '200':
          $ref: '#/components/responses/SettingsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /settings/defaults:
    post:
      tags: [Settings]
      operationId: restoreDefaultSettings
      summary: Restore selected settings to defaults.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreDefaultsRequest'
      responses:
        '200':
          $ref: '#/components/responses/SettingsResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /system/updates:
    get:
      tags: [Settings]
      operationId: getSystemUpdates
      summary: Get current update status and available releases.
      responses:
        '200':
          $ref: '#/components/responses/UpdateStatusResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /system/updates/check:
    post:
      tags: [Settings]
      operationId: checkSystemUpdates
      summary: Start an update check.
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /system/backups:
    post:
      tags: [Settings]
      operationId: createSystemBackup
      summary: Create a backup of database, settings, keys, and app state.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemBackupRequest'
      responses:
        '200':
          $ref: '#/components/responses/TaskResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /remote/status:
    get:
      tags: [Remote]
      operationId: getRemoteStatus
      summary: Get remote channel, tunnel, DDNS, MFA, and share exposure status.
      responses:
        '200':
          $ref: '#/components/responses/RemoteStatusResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /remote/channel/start:
    post:
      tags: [Remote]
      operationId: startRemoteChannel
      summary: Start the remote access channel.
      responses:
        '200':
          $ref: '#/components/responses/RemoteStatusResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /remote/channel/stop:
    post:
      tags: [Remote]
      operationId: stopRemoteChannel
      summary: Stop the remote access channel.
      responses:
        '200':
          $ref: '#/components/responses/RemoteStatusResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /remote/tunnel-mode:
    put:
      tags: [Remote]
      operationId: updateTunnelMode
      summary: Change remote tunnel mode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTunnelModeRequest'
      responses:
        '200':
          $ref: '#/components/responses/RemoteStatusResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /remote/domain-token:
    post:
      tags: [Remote]
      operationId: createDomainToken
      summary: Create a domain verification token.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DomainTokenRequest'
      responses:
        '200':
          $ref: '#/components/responses/DomainTokenResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
  /remote/domain-token/rotate:
    post:
      tags: [Remote]
      operationId: rotateDomainToken
      summary: Rotate the active domain verification token.
      responses:
        '200':
          $ref: '#/components/responses/DomainTokenResponse'
        default:
