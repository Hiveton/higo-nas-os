  schemas:
    ResponseEnvelope:
      type: object
      required: [ok, requestId, data]
      properties:
        ok:
          type: boolean
          const: true
        requestId:
          type: string
        data: {}
        meta:
          $ref: '#/components/schemas/ResponseMeta'
    PaginatedEnvelope:
      allOf:
        - $ref: '#/components/schemas/ResponseEnvelope'
        - type: object
          required: [pagination]
          properties:
            pagination:
              $ref: '#/components/schemas/Pagination'
    SuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/ResponseEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [success]
              properties:
                success:
                  type: boolean
                  const: true
    ErrorEnvelope:
      type: object
      required: [ok, requestId, error]
      properties:
        ok:
          type: boolean
          const: false
        requestId:
          type: string
        error:
          $ref: '#/components/schemas/Error'
    ResponseMeta:
      type: object
      properties:
        generatedAt:
          type: string
          format: date-time
        source:
          type: string
        eventCursor:
          type: string
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          examples: [permission_denied]
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'
    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string
    Pagination:
      type: object
      required: [page, pageSize, total]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        nextCursor:
          type: string
    Task:
      type: object
      required: [id, kind, status, progress, createdAt]
      properties:
        id:
          type: string
        kind:
          type: string
        status:
          $ref: '#/components/schemas/TaskStatus'
        title:
          type: string
        progress:
          type: number
          minimum: 0
          maximum: 100
        message:
          type: string
        risk:
          $ref: '#/components/schemas/RiskLevel'
        auditId:
          type: string
        result:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Event:
      type: object
      required: [id, type, createdAt]
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/EventType'
        subjectId:
          type: string
        title:
          type: string
        message:
          type: string
        payload:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    EventList:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        nextCursor:
          type: string
